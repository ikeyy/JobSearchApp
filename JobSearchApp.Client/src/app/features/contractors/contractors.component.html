<div class="page">
  <div class="page-header">
    <div>
      <div class="page-title">Contractors</div>
      <div class="page-subtitle">{{ result.total | number }} registered businesses</div>
    </div>
    <button class="btn btn-primary" (click)="openCreate()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      New Contractor
    </button>
  </div>

  <div class="toolbar">
    <div class="search-bar">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" [(ngModel)]="searchQuery" (ngModelChange)="onSearch($event)"
             placeholder="Search by name or ID…" />
      <span *ngIf="loading" class="spinner"></span>
    </div>
  </div>

  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Business Name</th>
          <th>Rating</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        <tr *ngIf="!loading && result.items.length === 0">
          <td colspan="4">
            <div class="empty-state">
              <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
              <p>No contractors found</p>
            </div>
          </td>
        </tr>
        <tr *ngFor="let c of result.items">
          <td><span class="mono text-muted text-xs">{{ c.contractorId }}</span></td>
          <td>
            <span class="business-name">{{ c.businessName }}</span>
          </td>
          <td>
            <app-stars [rating]="c.rating"></app-stars>
          </td>
          <td>
            <div class="actions">
              <button class="btn btn-ghost btn-sm" (click)="openEdit(c)">Edit</button>
              <button class="btn btn-danger btn-sm" (click)="confirmDelete(c)">Delete</button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <app-pagination [page]="pageNumber" [pageSize]="pageSize" [total]="result.total"
                  (pageChange)="onPageChange($event)"></app-pagination>
</div>

<!-- Modal -->
<div class="modal-overlay" *ngIf="showModal" (click)="closeModal()">
  <div class="modal" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <span class="modal-title">{{ editingId ? 'Edit Contractor' : 'New Contractor' }}</span>
      <button class="btn btn-ghost btn-sm btn-icon" (click)="closeModal()">✕</button>
    </div>
    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">Business Name</label>
          <input class="form-control" formControlName="businessName" placeholder="Test Corp."
                 [class.error]="form.get('businessName')?.invalid && form.get('businessName')?.touched" />
          <div class="form-error" *ngIf="form.get('businessName')?.invalid && form.get('businessName')?.touched">Required</div>
        </div>
        <div class="form-group">
          <label class="form-label">Rating (0 – 5)</label>
          <input class="form-control" type="number" formControlName="rating" min="0" max="5" step="0.1"
                 [class.error]="form.get('rating')?.invalid && form.get('rating')?.touched" />
          <div class="form-error" *ngIf="form.get('rating')?.invalid && form.get('rating')?.touched">Must be 0–5</div>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-ghost" (click)="closeModal()">Cancel</button>
        <button type="submit" class="btn btn-primary" [disabled]="form.invalid || saving">
          <span *ngIf="saving" class="spinner"></span>
          {{ editingId ? 'Save Changes' : 'Create Contractor' }}
        </button>
      </div>
    </form>
  </div>
</div>

<app-confirm-dialog *ngIf="deleteTarget"
  title="Delete Contractor"
  [message]="'Delete ' + deleteTarget.businessName + '? This cannot be undone.'"
  (confirmed)="doDelete()"
  (cancelled)="deleteTarget = null">
</app-confirm-dialog>
